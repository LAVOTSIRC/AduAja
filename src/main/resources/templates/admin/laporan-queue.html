<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AduAja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gray-50">
    <main class="max-w-6xl mx-auto p-6">
      <div class="bg-white rounded-xl border">
        <div class="px-6 pt-6 pb-4 flex items-center justify-between">
          <div>
            <h2 class="text-lg font-semibold">Antrean Laporan Masuk</h2>
            <p class="text-sm text-gray-600">
              Daftar laporan yang perlu divalidasi dan diproses (FR-ADM-01)
            </p>
          </div>
          <button
            type="button"
            x-on:click="showFilters = !showFilters"
            class="flex items-center gap-2 border px-3 py-2 rounded-md text-sm"
          >
            <i data-lucide="filter" class="w-4 h-4"></i>
            <span
              x-text="showFilters ? 'Tutup Filter' : 'Filter dan Sortir'"
            ></span>
          </button>
        </div>
        <div class="px-6 pb-6">
          <div
            x-show="showFilters"
            x-cloak
            class="mb-4 grid grid-cols-1 gap-3 md:grid-cols-3"
          >
            <div>
              <label class="text-xs text-gray-600 mb-1 block">Prioritas</label>
              <select class="w-full px-3 py-2 border rounded-md">
                <option>Semua Prioritas</option>
                <option>Kritis</option>
                <option>Tinggi</option>
                <option>Sedang</option>
                <option>Rendah</option>
              </select>
            </div>
            <div>
              <label class="text-xs text-gray-600 mb-1 block">Urutkan</label>
              <select class="w-full px-3 py-2 border rounded-md">
                <option>Tanggal Masuk</option>
                <option>Prioritas</option>
                <option>Status</option>
              </select>
            </div>
            <div>
              <label class="text-xs text-gray-600 mb-1 block">Arah</label>
              <select class="w-full px-3 py-2 border rounded-md">
                <option>Terbaru / Tertinggi</option>
                <option>Terlama / Terendah</option>
              </select>
            </div>
          </div>

          <div class="mb-4 flex gap-3">
            <div class="relative flex-1">
              <i
                data-lucide="search"
                class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
              ></i>
              <input
                type="text"
                class="w-full pl-10 px-3 py-2 border rounded-md"
                placeholder="Cari berdasarkan ID Tiket, Nama Pelapor, atau Wilayah..."
              />
            </div>
            <select class="px-3 py-2 border rounded-md">
              <option>Semua Status</option>
              <option>Menunggu Verifikasi</option>
              <option>Dalam Peninjauan</option>
              <option>Terlambat (SLA)</option>
            </select>
          </div>

          <div class="border rounded-lg overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full">
                <thead class="bg-gray-50">
                  <tr>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      ID Tiket
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Judul dan Kategori
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Pelapor
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Wilayah
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Tanggal Masuk
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Status
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      SLA
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Aksi
                    </th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                  <tr
                    th:each="laporan : ${queueReports}"
                    class="hover:bg-gray-50"
                  >
                    <td class="px-4 py-3">
                      <div class="flex items-center gap-2">
                        <span
                          class="font-mono text-sm font-semibold"
                          th:text="${laporan.id}"
                          >ID</span
                        >
                        <span
                          class="text-xs px-2 py-0.5 rounded bg-gray-100"
                          th:text="${laporan.prioritas}"
                          >Prioritas</span
                        >
                      </div>
                    </td>
                    <td class="px-4 py-3">
                      <div>
                        <p
                          class="font-medium text-sm"
                          th:text="${laporan.judul}"
                        >
                          Judul
                        </p>
                        <p
                          class="text-xs text-gray-500"
                          th:text="${laporan.kategori}"
                        >
                          Kategori
                        </p>
                      </div>
                    </td>
                    <td class="px-4 py-3 text-sm" th:text="${laporan.pelapor}">
                      Pelapor
                    </td>
                    <td class="px-4 py-3">
                      <div class="flex items-center gap-1 text-sm">
                        <i
                          data-lucide="map-pin"
                          class="w-3 h-3 text-gray-400"
                        ></i>
                        <span th:text="${laporan.wilayah}">Wilayah</span>
                      </div>
                    </td>
                    <td class="px-4 py-3">
                      <div class="flex items-center gap-1 text-sm">
                        <i
                          data-lucide="clock"
                          class="w-3 h-3 text-gray-400"
                        ></i>
                        <span th:text="${laporan.tanggalMasuk}">Tanggal</span>
                      </div>
                    </td>
                    <td class="px-4 py-3">
                      <span
                        class="text-xs px-2 py-1 rounded bg-gray-100"
                        th:text="${laporan.status}"
                        >Status</span
                      >
                    </td>
                    <td class="px-4 py-3">
                      <span
                        class="text-sm font-medium"
                        th:text="${laporan.sisaWaktuSLA}"
                        >SLA</span
                      >
                    </td>
                    <td class="px-4 py-3">
                      <a
                        th:href="@{/admin/validation(id=${laporan.id})}"
                        class="inline-flex items-center gap-1 border px-2 py-1 rounded text-sm"
                      >
                        <i data-lucide="eye" class="w-4 h-4"></i>
                        Detail
                      </a>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
