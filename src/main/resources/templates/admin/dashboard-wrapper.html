<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AduAja - Dashboard Wrapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-50">
    <main class="max-w-3xl mx-auto p-6 space-y-6">
      <div class="bg-white rounded-xl border p-6">
        <h1 class="text-2xl font-bold text-gray-900">Dashboard Wrapper</h1>
        <p class="text-sm text-gray-600">
          Menentukan dashboard berdasarkan peran admin.
        </p>
      </div>

      <div
        th:if="${!isAuthenticated}"
        class="bg-yellow-50 border border-yellow-200 rounded-xl p-6"
      >
        <h2 class="text-lg font-semibold text-yellow-900 mb-2">Belum Login</h2>
        <p class="text-sm text-yellow-800 mb-4">
          Silakan login untuk mengakses dashboard admin.
        </p>
        <a
          th:href="@{/admin/login}"
          class="inline-flex items-center gap-2 border border-yellow-300 bg-white px-4 py-2 rounded-md text-sm"
          >Ke Halaman Login</a
        >
      </div>

      <div th:if="${isAuthenticated}" class="bg-white rounded-xl border p-6">
        <p class="text-sm text-gray-600">Role aktif:</p>
        <p class="text-lg font-semibold text-gray-900" th:text="${userRole}">
          admin_pusat
        </p>

        <div class="mt-4" th:switch="${userRole}">
          <div th:case="'admin_pusat'" class="space-y-2">
            <p class="text-sm text-gray-600">Rute dashboard admin pusat.</p>
            <a
              th:href="@{/admin/dashboard}"
              class="inline-flex items-center gap-2 border px-4 py-2 rounded-md text-sm"
              >Buka Dashboard Admin Pusat</a
            >
          </div>
          <div th:case="*" class="space-y-2">
            <p class="text-sm text-gray-600">Rute dashboard admin dinas.</p>
            <p class="text-sm text-gray-700" th:text="|Dinas: ${dinasName}|">
              Dinas
            </p>
            <a
              th:href="@{/admin/dinas/dashboard}"
              class="inline-flex items-center gap-2 border px-4 py-2 rounded-md text-sm"
              >Buka Dashboard Dinas</a
            >
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
