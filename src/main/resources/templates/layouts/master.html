<!doctype html>
<html
  lang="id"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} ?: 'AduAja'">AduAja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
    <th:block layout:fragment="extraHead"></th:block>
  </head>
  <body>
    <header
      th:fragment="navbar"
      class="bg-white shadow-sm sticky top-0 z-10"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <a th:href="@{/}" class="flex items-center gap-3">
            <div
              class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-lg flex items-center justify-center"
            >
              <span class="text-white font-bold text-lg">A</span>
            </div>
            <div>
              <h1 class="text-xl font-bold text-gray-900">AduAja</h1>
              <p class="text-xs text-gray-500 hidden sm:block">
                Pengaduan Masyarakat
              </p>
            </div>
          </a>

          <th:block layout:fragment="navRight">
            <div class="flex items-center gap-2 sm:gap-4">
              <span class="text-sm text-gray-500">AduAja</span>
            </div>
          </th:block>
        </div>
      </div>
    </header>

    <main layout:fragment="content"></main>

    <script src="/js/app.js"></script>
    <script>
      if (window.lucide) {
        lucide.createIcons();
      }
    </script>
    <th:block layout:fragment="extraScripts"></th:block>
  </body>
</html>
