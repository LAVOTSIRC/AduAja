<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AduAja - Notifikasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="min-h-screen bg-gray-50">
    <header class="bg-white shadow-sm sticky top-0 z-10">
      <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-3 h-16">
          <a
            th:href="@{/warga/dashboard}"
            class="p-2 hover:bg-gray-100 rounded-lg"
          >
            <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i>
          </a>
          <div class="flex-1">
            <h1 class="font-bold text-gray-900">Notifikasi</h1>
            <p
              class="text-xs text-gray-500"
              th:text="${unreadCount > 0 ? unreadCount + ' notifikasi belum dibaca' : 'Semua notifikasi sudah dibaca'}"
            >
              Status notifikasi
            </p>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="flex gap-2 mb-6">
        <a
          th:href="@{/warga/notifications(filter='semua')}"
          th:class="${filter == 'semua'} ? 'px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-blue-600 text-white' : 'px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-white text-gray-700 hover:bg-gray-100 border border-gray-200'"
        >
          Semua (<span th:text="${totalCount}">0</span>)
        </a>
        <a
          th:href="@{/warga/notifications(filter='belum-dibaca')}"
          th:class="${filter == 'belum-dibaca'} ? 'px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-blue-600 text-white' : 'px-4 py-2 rounded-lg font-medium text-sm transition-colors bg-white text-gray-700 hover:bg-gray-100 border border-gray-200'"
        >
          Belum Dibaca (<span th:text="${unreadCount}">0</span>)
        </a>
      </div>

      <div
        th:if="${notifications != null and !#lists.isEmpty(notifications)}"
        class="space-y-3"
      >
        <div
          th:each="notification : ${notifications}"
          th:class="${notification.isRead} ? 'bg-white p-4 rounded-xl border cursor-pointer transition-all hover:shadow-md border-gray-100' : 'bg-white p-4 rounded-xl border cursor-pointer transition-all hover:shadow-md border-blue-200 bg-blue-50/30'"
        >
          <div class="flex gap-4">
            <div
              th:class="|w-12 h-12 ${notification.bgColor} rounded-lg flex items-center justify-center flex-shrink-0|"
            >
              <i
                th:attr="data-lucide=${notification.icon}"
                th:class="|w-6 h-6 ${notification.iconColor}|"
              ></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2 mb-1">
                <h3
                  th:class="${notification.isRead} ? 'font-semibold text-gray-900' : 'font-semibold text-blue-900'"
                  th:text="${notification.title}"
                >
                  Judul
                </h3>
                <span
                  th:if="${!notification.isRead}"
                  class="w-2 h-2 bg-blue-600 rounded-full flex-shrink-0 mt-1.5"
                ></span>
              </div>
              <p
                class="text-sm text-gray-600 mb-2 line-clamp-2"
                th:text="${notification.message}"
              >
                Pesan
              </p>
              <div class="flex items-center justify-between">
                <p class="text-xs text-gray-500" th:text="${notification.time}">
                  Waktu
                </p>
                <a
                  th:if="${notification.action}"
                  th:href="@{/warga/report-detail(id=${notification.reportId})}"
                  class="text-xs font-medium text-blue-600 hover:underline"
                  >Lihat Detail</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>

      <div
        th:if="${notifications == null or #lists.isEmpty(notifications)}"
        class="bg-white p-12 rounded-xl text-center"
      >
        <div
          class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4"
        >
          <i data-lucide="bell" class="w-10 h-10 text-gray-400"></i>
        </div>
        <h3 class="font-semibold text-gray-900 mb-2">Tidak Ada Notifikasi</h3>
        <p
          class="text-gray-500"
          th:text="${filter == 'belum-dibaca' ? 'Semua notifikasi sudah dibaca' : 'Belum ada notifikasi untuk ditampilkan'}"
        >
          Belum ada notifikasi untuk ditampilkan
        </p>
      </div>
    </main>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
