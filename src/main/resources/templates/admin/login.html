<html
  lang="id"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/master}"
>
  <th:block layout:fragment="extraHead">
    <title>AduAja - Login Admin</title>
    <style>
      [x-cloak] { display: none !important; }
    </style>
  </th:block>

  <div
    layout:fragment="content"
    class="aduaja-login-shell min-h-screen w-full flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md">
      <div
        class="aduaja-glow-card bg-white rounded-2xl p-8"
        x-data="{ showPassword: false }"
      >
        <div class="text-center mb-6">
          <div
            class="aduaja-login-brand mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4"
          >
            <i data-lucide="shield" class="w-8 h-8 text-white"></i>
          </div>
          <h1 class="text-3xl font-bold text-gray-900">Sistem AduAja</h1>
          <p class="text-base text-gray-600">
            Sistem Informasi Pengaduan dan Aspirasi Masyarakat
          </p>
        </div>

        <!-- Info Message (logout) -->
        <div
          th:if="${info}"
          class="mb-4 border border-emerald-200 bg-emerald-50 text-emerald-700 px-4 py-3 rounded-lg text-sm"
          th:text="${info}"
        ></div>

        <!-- Error Message -->
        <div
          th:if="${error}"
          class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm"
          th:text="${error}"
        ></div>

        <!-- Login Form — POST sekarang ditangani AdminAuthController -->
        <form
          th:action="@{/admin/login}"
          method="post"
          class="space-y-4"
        >
          <!-- Email -->
          <div class="space-y-2">
            <label for="admin-email" class="block text-sm font-medium text-gray-700">
              Email
            </label>
            <input
              id="admin-email"
              name="email"
              type="email"
              placeholder="admin@aduaja.go.id"
              class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>

          <!-- Password -->
          <div class="space-y-2">
            <label for="admin-password" class="block text-sm font-medium text-gray-700">
              Password
            </label>
            <div class="relative">
              <input
                id="admin-password"
                name="password"
                x-bind:type="showPassword ? 'text' : 'password'"
                placeholder="Masukkan password Anda"
                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10"
                required
              />
              <button
                type="button"
                x-on:click="showPassword = !showPassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
              >
                <i x-show="!showPassword" data-lucide="eye" class="w-4 h-4"></i>
                <i x-show="showPassword" data-lucide="eye-off" class="w-4 h-4"></i>
              </button>
            </div>
          </div>

          <!-- Remember Me -->
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center space-x-2 cursor-pointer">
              <input type="checkbox" class="rounded" />
              <span class="text-gray-600">Ingat saya</span>
            </label>
            <a href="#" class="text-blue-600 hover:underline">Lupa password?</a>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            id="btn-admin-login"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md font-medium transition-colors"
          >
            Login
          </button>
        </form>

        <p class="text-xs text-center text-gray-500 mt-4">
          Sistem terlindungi dengan enkripsi SSL/TLS
        </p>

        <div class="mt-6 text-center border-t pt-4">
          <p class="text-sm text-gray-600">
            Login sebagai Warga?
          </p>
          <a th:href="@{/warga/login}" class="text-blue-600 font-medium hover:underline text-sm">
            Login Warga
          </a>
        </div>
      </div>
    </div>
  </div>
</html>
