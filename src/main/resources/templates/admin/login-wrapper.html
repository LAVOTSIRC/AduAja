<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AduAja - Login Wrapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-50">
    <main class="max-w-3xl mx-auto p-6 space-y-6">
      <div class="bg-white rounded-xl border p-6">
        <h1 class="text-2xl font-bold text-gray-900">Login Wrapper</h1>
        <p class="text-sm text-gray-600">
          Jika sudah login, arahkan ke dashboard.
        </p>
      </div>

      <div
        th:if="${isAuthenticated}"
        class="bg-green-50 border border-green-200 rounded-xl p-6"
      >
        <h2 class="text-lg font-semibold text-green-900 mb-2">Sudah Login</h2>
        <p class="text-sm text-green-800 mb-4">
          Anda sudah terautentikasi. Lanjut ke dashboard.
        </p>
        <a
          th:href="@{/admin/dashboard}"
          class="inline-flex items-center gap-2 border border-green-300 bg-white px-4 py-2 rounded-md text-sm"
          >Ke Dashboard</a
        >
      </div>

      <div th:if="${!isAuthenticated}" class="bg-white rounded-xl border p-6">
        <p class="text-sm text-gray-600 mb-4">
          Silakan login melalui halaman admin.
        </p>
        <a
          th:href="@{/admin/login}"
          class="inline-flex items-center gap-2 border px-4 py-2 rounded-md text-sm"
          >Buka Login Admin</a
        >
      </div>
    </main>
  </body>
</html>
