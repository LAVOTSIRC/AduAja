<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AduAja - Modul Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="min-h-screen bg-gray-50">
    <header class="bg-white shadow-sm">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <h2 class="text-2xl font-bold text-gray-900">Modul Admin</h2>
        <p class="text-sm text-gray-600">
          Area kerja untuk validasi, disposisi, dan monitoring laporan.
        </p>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div
          th:each="panel : ${panels}"
          class="bg-white rounded-xl border border-gray-100 shadow-sm p-6"
        >
          <div
            th:class="|w-12 h-12 rounded-lg flex items-center justify-center ${panel.color}|"
          >
            <i th:attr="data-lucide=${panel.icon}" class="w-6 h-6"></i>
          </div>
          <h3
            class="text-lg font-semibold text-gray-900 mt-4"
            th:text="${panel.title}"
          >
            Judul
          </h3>
          <p class="text-sm text-gray-600 mt-2" th:text="${panel.description}">
            Deskripsi
          </p>
        </div>
      </div>
    </main>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
