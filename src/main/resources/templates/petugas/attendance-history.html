<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AduAja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50">
    <div class="bg-[#3b82f6] text-white p-4">
      <div class="flex items-center gap-3 mb-4">
        <a
          th:href="@{/petugas/dashboard}"
          class="p-2 hover:bg-white/10 rounded-lg"
        >
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <div>
          <h1 class="text-xl font-semibold">Riwayat Absensi</h1>
          <p class="text-sm text-white/80" th:text="${user.name}">Nama</p>
        </div>
      </div>
    </div>

    <div class="p-4">
      <div class="bg-white rounded-lg shadow-sm mb-4 p-4">
        <h2 class="font-semibold mb-2">Ringkasan Bulan Ini</h2>
        <div class="grid grid-cols-3 gap-4 text-center">
          <div class="p-3 bg-green-50 rounded-lg">
            <div
              class="text-2xl font-bold text-green-600"
              th:text="${summary.daysPresent}"
            >
              0
            </div>
            <div class="text-xs text-gray-600">Hari Hadir</div>
          </div>
          <div class="p-3 bg-blue-50 rounded-lg">
            <div
              class="text-2xl font-bold text-blue-600"
              th:text="${summary.totalHours}"
            >
              0
            </div>
            <div class="text-xs text-gray-600">Total Jam</div>
          </div>
          <div class="p-3 bg-orange-50 rounded-lg">
            <div
              class="text-2xl font-bold text-orange-600"
              th:text="${summary.lateCount}"
            >
              0
            </div>
            <div class="text-xs text-gray-600">Terlambat</div>
          </div>
        </div>
      </div>

      <div class="space-y-3">
        <div
          th:each="record : ${attendanceRecords}"
          class="bg-white rounded-lg shadow-sm p-4"
        >
          <div class="flex items-center justify-between mb-3">
            <div>
              <div
                class="font-semibold text-gray-800"
                th:text="${record.dateFormatted}"
              >
                Tanggal
              </div>
              <div
                class="text-xs px-2 py-1 rounded-full inline-block mt-1"
                th:classappend="${record.status == 'completed'} ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'"
                th:text="${record.status == 'completed' ? 'Selesai' : 'Sedang Berlangsung'}"
              >
                Status
              </div>
            </div>
            <div class="text-right">
              <div class="text-sm text-gray-600">Durasi</div>
              <div
                class="font-semibold text-gray-800"
                th:text="${record.duration}"
              >
                00:00:00
              </div>
            </div>
          </div>

          <div class="space-y-2 border-t pt-3">
            <div class="flex items-start gap-2">
              <i
                data-lucide="clock"
                class="w-4 h-4 text-green-600 mt-0.5 flex-shrink-0"
              ></i>
              <div class="flex-1 min-w-0">
                <div
                  class="text-sm font-medium text-gray-700"
                  th:text="|Check-in: ${record.checkInTime}|"
                ></div>
                <div
                  class="flex items-start gap-1 text-xs text-gray-500 mt-0.5"
                >
                  <i
                    data-lucide="map-pin"
                    class="w-3 h-3 mt-0.5 flex-shrink-0"
                  ></i>
                  <span
                    class="break-words"
                    th:text="${record.checkInLocation.address}"
                    >Alamat</span
                  >
                </div>
              </div>
            </div>

            <div
              th:if="${record.checkOutTime != null}"
              class="flex items-start gap-2"
            >
              <i
                data-lucide="clock"
                class="w-4 h-4 text-red-600 mt-0.5 flex-shrink-0"
              ></i>
              <div class="flex-1 min-w-0">
                <div
                  class="text-sm font-medium text-gray-700"
                  th:text="|Check-out: ${record.checkOutTime}|"
                ></div>
                <div
                  class="flex items-start gap-1 text-xs text-gray-500 mt-0.5"
                >
                  <i
                    data-lucide="map-pin"
                    class="w-3 h-3 mt-0.5 flex-shrink-0"
                  ></i>
                  <span
                    class="break-words"
                    th:text="${record.checkOutLocation.address}"
                    >Alamat</span
                  >
                </div>
              </div>
            </div>

            <div class="flex items-start gap-2 pt-2 border-t">
              <i
                data-lucide="smartphone"
                class="w-4 h-4 text-gray-400 mt-0.5 flex-shrink-0"
              ></i>
              <div class="text-xs text-gray-500">
                <div th:text="${record.deviceInfo.browser}"></div>
                <div
                  th:text="|${record.deviceInfo.os} - IP: ${record.deviceInfo.ip}|"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
