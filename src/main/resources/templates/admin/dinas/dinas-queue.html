<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AduAja - Antrean Dinas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="min-h-screen bg-gray-50">
    <main class="max-w-6xl mx-auto p-6">
      <div class="bg-white rounded-xl border">
        <div class="px-6 pt-6 pb-4 flex items-center justify-between">
          <div>
            <h2
              class="text-lg font-semibold"
              th:text="|Antrean Laporan - ${dinasName}|"
            >
              Antrean Laporan
            </h2>
            <p class="text-sm text-gray-600">
              Daftar laporan yang didisposisikan untuk ditindaklanjuti
            </p>
          </div>
          <button
            class="flex items-center gap-2 border px-3 py-2 rounded-md text-sm"
          >
            <i data-lucide="filter" class="w-4 h-4"></i>
            Filter dan Sortir
          </button>
        </div>
        <div class="px-6 pb-6">
          <div class="mb-4 flex gap-3">
            <div class="relative flex-1">
              <i
                data-lucide="search"
                class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
              ></i>
              <input
                type="text"
                class="w-full pl-10 px-3 py-2 border rounded-md"
                placeholder="Cari berdasarkan ID Tiket atau Judul..."
              />
            </div>
            <select class="px-3 py-2 border rounded-md">
              <option>Semua Status</option>
              <option>Belum Ditindaklanjuti</option>
              <option>Dalam Penanganan</option>
              <option>Selesai</option>
              <option>Terlambat SLA</option>
            </select>
          </div>

          <div
            th:if="${terlambatCount > 0}"
            class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg"
          >
            <div class="flex items-center gap-2 text-red-800">
              <i data-lucide="alert-circle" class="w-5 h-5"></i>
              <span
                class="font-semibold"
                th:text="|Perhatian! ${terlambatCount} laporan terlambat SLA|"
                >Peringatan</span
              >
            </div>
          </div>

          <div class="border rounded-lg overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full">
                <thead class="bg-gray-50">
                  <tr>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      ID Tiket
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Judul dan Kategori
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Pelapor
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Wilayah
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Disposisi
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Status
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Deadline
                    </th>
                    <th
                      class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase"
                    >
                      Aksi
                    </th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                  <tr
                    th:each="laporan : ${laporanDinas}"
                    class="hover:bg-gray-50"
                  >
                    <td class="px-4 py-3">
                      <div class="flex items-center gap-2">
                        <span
                          class="font-mono text-sm font-semibold"
                          th:text="${laporan.id}"
                          >ID</span
                        >
                        <span
                          class="text-xs px-2 py-0.5 rounded bg-gray-100"
                          th:text="${laporan.prioritas}"
                          >Prioritas</span
                        >
                      </div>
                    </td>
                    <td class="px-4 py-3">
                      <div>
                        <p
                          class="font-medium text-sm"
                          th:text="${laporan.judul}"
                        >
                          Judul
                        </p>
                        <p
                          class="text-xs text-gray-500"
                          th:text="${laporan.kategori}"
                        >
                          Kategori
                        </p>
                      </div>
                    </td>
                    <td class="px-4 py-3">
                      <div class="flex items-center gap-1 text-sm">
                        <i data-lucide="user" class="w-3 h-3 text-gray-400"></i>
                        <span th:text="${laporan.pelapor}">Pelapor</span>
                      </div>
                    </td>
                    <td class="px-4 py-3">
                      <div class="flex items-center gap-1 text-sm">
                        <i
                          data-lucide="map-pin"
                          class="w-3 h-3 text-gray-400"
                        ></i>
                        <span th:text="${laporan.wilayah}">Wilayah</span>
                      </div>
                    </td>
                    <td class="px-4 py-3">
                      <div class="flex items-center gap-1 text-sm">
                        <i
                          data-lucide="calendar"
                          class="w-3 h-3 text-gray-400"
                        ></i>
                        <span th:text="${laporan.tanggalDisposisi}"
                          >Tanggal</span
                        >
                      </div>
                    </td>
                    <td class="px-4 py-3">
                      <span
                        class="text-xs px-2 py-1 rounded bg-gray-100"
                        th:text="${laporan.status}"
                        >Status</span
                      >
                    </td>
                    <td class="px-4 py-3">
                      <span
                        class="text-sm font-medium"
                        th:text="${laporan.sisaWaktu}"
                        >SLA</span
                      >
                    </td>
                    <td class="px-4 py-3">
                      <a
                        th:href="@{/admin/dinas/queue/detail(id=${laporan.id})}"
                        class="inline-flex items-center gap-1 border px-2 py-1 rounded text-sm"
                      >
                        <i data-lucide="eye" class="w-4 h-4"></i>
                        Detail
                      </a>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div
            class="mt-4 flex items-center justify-between text-sm text-gray-600"
          >
            <p>
              Menampilkan <span th:text="${startIndex}">1</span>-<span
                th:text="${endIndex}"
                >1</span
              >
              dari <span th:text="${totalCount}">0</span> laporan
            </p>
            <div class="flex gap-2">
              <button
                class="border px-3 py-1 rounded text-sm"
                th:disabled="${page <= 1}"
              >
                Sebelumnya
              </button>
              <button
                class="border px-3 py-1 rounded text-sm"
                th:disabled="${page >= totalPages}"
              >
                Selanjutnya
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
