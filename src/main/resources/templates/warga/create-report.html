<html
  lang="id"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/master}"
>
  <th:block layout:fragment="extraHead">
    <title>AduAja - Buat Laporan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      #map { height: 300px; z-index: 1; }
      [x-cloak] { display: none !important; }
    </style>
  </th:block>

  <div layout:fragment="content" class="min-h-screen bg-gray-50">
    <header class="bg-white shadow-sm sticky top-0 z-10">
      <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-3 h-16">
          <a
            th:href="@{/warga/dashboard}"
            class="p-2 hover:bg-gray-100 rounded-lg"
          >
            <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i>
          </a>
          <div>
            <h1 class="font-bold text-gray-900">Buat Laporan Baru</h1>
            <p class="text-xs text-gray-500">
              Laporkan kerusakan infrastruktur
            </p>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-6"
          x-data="reportForm()" x-init="initMap()">
      <form
        th:action="@{/warga/dashboard}"
        method="post"
        enctype="multipart/form-data"
        class="space-y-6"
      >
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
          <label class="block text-sm font-medium text-gray-900 mb-2">
            Kategori Laporan <span class="text-red-500">*</span>
          </label>
          <select
            name="category"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            required
          >
            <option value="">Pilih kategori</option>
            <option value="Infrastruktur Jalan">Infrastruktur Jalan</option>
            <option value="Listrik Publik">Listrik Publik</option>
            <option value="Sistem Drainase">Sistem Drainase</option>
            <option value="Taman dan Ruang Publik">Taman dan Ruang Publik</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
          <label class="block text-sm font-medium text-gray-900 mb-2">
            Foto Laporan <span class="text-red-500">*</span>
          </label>
          <div
            class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-4"
          >
            <p class="text-sm text-yellow-800 flex items-start gap-2">
              <i
                data-lucide="alert-circle"
                class="w-4 h-4 mt-0.5 flex-shrink-0"
              ></i>
              <span>
                <strong>Wajib menggunakan kamera:</strong> Foto harus diambil
                langsung menggunakan kamera perangkat Anda, bukan dari
                galeri/file.
              </span>
            </p>
          </div>

          <div class="relative">
            <div id="photo-preview" x-show="photoSelected" x-cloak class="mb-4">
              <img :src="photoUrl" class="w-full h-64 object-cover rounded-lg border border-gray-200" alt="Preview foto" />
              <button type="button" @click="removePhoto()" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1 hover:bg-red-600">
                <i data-lucide="x" class="w-4 h-4"></i>
              </button>
            </div>
            <label class="flex flex-col items-center justify-center w-full h-64 border-2 border-dashed border-blue-300 rounded-lg cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition-all bg-gradient-to-br from-blue-50 to-white"
                   :class="{ 'hidden': photoSelected }"
            >
              <div
                class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mb-4"
              >
                <i data-lucide="camera" class="w-10 h-10 text-blue-600"></i>
              </div>
              <p class="text-base font-semibold text-blue-900 mb-1">
                Buka Kamera
              </p>
              <p class="text-sm text-blue-600 mb-1">
                Ambil foto kerusakan secara langsung
              </p>
              <p class="text-xs text-gray-500 px-6 text-center">
                Klik untuk mengakses kamera perangkat Anda
              </p>
              <input
                type="file"
                name="photo"
                accept="image/*"
                capture="environment"
                class="hidden"
                required
                @change="handlePhoto($event)"
              />
            </label>
          </div>
        </div>

        <div
          class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"
          x-data="{ count: 0 }"
          x-init="count = $el.querySelector('textarea').value.length"
        >
          <label class="block text-sm font-medium text-gray-900 mb-2">
            Deskripsi Kerusakan <span class="text-red-500">*</span>
          </label>
          <textarea
            name="description"
            rows="5"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
            placeholder="Jelaskan detail kerusakan (minimal 20 karakter)"
            x-on:input="count = $event.target.value.length"
            required
          ></textarea>
          <div class="flex justify-between items-center mt-2">
            <p
              class="text-xs"
              :class="count >= 20 ? 'text-green-600' : 'text-red-500'"
              x-text="count + '/20 karakter minimum'"
            ></p>
          </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
          <label class="block text-sm font-medium text-gray-900 mb-2">
            Lokasi <span class="text-red-500">*</span>
          </label>

          <div class="mb-4">
            <label class="block text-sm text-gray-600 mb-2"
              >Patokan Lokasi</label
            >
            <input
              type="text"
              name="landmark"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="Contoh: Dekat Indomaret"
            />
          </div>

          <div id="map" class="rounded-lg border border-gray-200 mb-4"></div>

          <button
            type="button"
            @click="getLocation()"
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition-colors flex items-center justify-center gap-2 mb-4"
          >
            <i data-lucide="map-pin" class="w-5 h-5"></i>
            <span x-text="loadingGps ? 'Mengambil lokasi...' : 'Ambil Koordinat GPS'"></span>
          </button>

          <div class="grid grid-cols-2 gap-3 text-sm">
            <div>
              <p class="text-gray-600">Latitude:</p>
              <input
                type="text"
                name="latitude"
                x-model="lat"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg font-mono"
                readonly
              />
            </div>
            <div>
              <p class="text-gray-600">Longitude:</p>
              <input
                type="text"
                name="longitude"
                x-model="lng"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg font-mono"
                readonly
              />
            </div>
          </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-4 rounded-lg font-medium hover:shadow-lg transition-shadow"
          >
            Kirim Laporan
          </button>
          <p class="text-xs text-gray-500 text-center mt-3">
            Pastikan semua informasi sudah benar sebelum mengirim
          </p>
        </div>
      </form>
    </main>
  </div>

  <th:block layout:fragment="extraScripts">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      function reportForm() {
        return {
          lat: '',
          lng: '',
          map: null,
          marker: null,
          loadingGps: false,
          photoSelected: false,
          photoUrl: '',
          initMap() {
            this.map = L.map('map').setView([3.5952, 98.6722], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
              attribution: '&copy; OpenStreetMap contributors'
            }).addTo(this.map);
            this.map.on('click', (e) => {
              this.setMarker(e.latlng.lat, e.latlng.lng);
            });
            setTimeout(() => { this.map.invalidateSize(); }, 200);
          },
          setMarker(lat, lng) {
            this.lat = lat.toFixed(6);
            this.lng = lng.toFixed(6);
            if (this.marker) {
              this.marker.setLatLng([lat, lng]);
            } else {
              this.marker = L.marker([lat, lng], { draggable: true }).addTo(this.map);
              this.marker.on('dragend', (e) => {
                const pos = e.target.getLatLng();
                this.lat = pos.lat.toFixed(6);
                this.lng = pos.lng.toFixed(6);
              });
            }
            this.map.setView([lat, lng], 15);
          },
          getLocation() {
            this.loadingGps = true;
            if (navigator.geolocation) {
              navigator.geolocation.getCurrentPosition(
                (pos) => {
                  this.setMarker(pos.coords.latitude, pos.coords.longitude);
                  this.loadingGps = false;
                },
                (err) => {
                  alert('Gagal mengambil lokasi. Pastikan GPS aktif.');
                  this.loadingGps = false;
                },
                { enableHighAccuracy: true }
              );
            } else {
              alert('Browser tidak mendukung Geolocation.');
              this.loadingGps = false;
            }
          },
          handlePhoto(event) {
            const file = event.target.files[0];
            if (file) {
              this.photoUrl = URL.createObjectURL(file);
              this.photoSelected = true;
            }
          },
          removePhoto() {
            this.photoSelected = false;
            this.photoUrl = '';
          }
        };
      }
    </script>
  </th:block>
</html>
